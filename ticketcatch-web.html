<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>TicketCatch</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#0f0f0f;--orange:#EC5B13;--green:#34D399;--silver:#A0AEC0;
  --card:#1a1a1a;--divider:#2a2a2a;--red:#FC8181;--white:rgba(255,255,255,.90);
}
html,body{height:100%;background:#0f0f0f;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#app{
  max-width:430px;width:100%;min-height:100dvh;height:100dvh;
  background:linear-gradient(180deg,#1a1a1a 0%,#0f0f0f 100%);margin:0 auto;position:relative;
  overflow:hidden;display:flex;flex-direction:column;
  /* landscape notch: keep content out of the rounded corners / sensor housing */
  padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right);
}
/* Safe area top: pushes content below the notch / Dynamic Island */
.safe-top{padding-top:env(safe-area-inset-top)}
/* #root must be a flex column with min-height:0 — without it the scroll chain
   breaks and .scroll children can never overflow (page appears "frozen") */
#root{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.screen{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.scroll{overflow-y:auto;-webkit-overflow-scrolling:touch;flex:1;min-height:0;overscroll-behavior:contain}
.scroll::-webkit-scrollbar,.hscroll::-webkit-scrollbar{display:none}

/* ── ANIMATIONS ─────────────────────────── */
@keyframes pulse-dot{0%,100%{opacity:.2}50%{opacity:1}}
/* Gentle nudge: one small pulse every 20s instead of a constant throb */
@keyframes pulse-scale{0%,5%,100%{transform:scale(1)}1.5%{transform:scale(1.035)}3.5%{transform:scale(.985)}}
@keyframes radar-spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
@keyframes fade-in{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
@keyframes map-pulse{0%{transform:scale(1);opacity:.6}100%{transform:scale(2.5);opacity:0}}
@keyframes laser-scan{0%{top:4%}50%{top:94%}100%{top:4%}}

.live-dot{width:8px;height:8px;border-radius:50%;background:#e53e3e;display:inline-block;animation:pulse-dot .8s infinite}
.pulse-btn{animation:pulse-scale 20s ease-in-out infinite}
.fade-in{animation:fade-in .25s ease-out}

/* Press feedback (HIG/MD: tactile response <100ms, transform-only = no reflow) */
button{touch-action:manipulation;font-family:inherit}
.btn,.pill,.chip,.icon-btn,.back-btn,.map-hud-btn,.pay-btn{transition:transform .15s ease-out,opacity .15s ease-out}
.btn:active,.pill:active,.chip:active,.icon-btn:active,.back-btn:active,.map-hud-btn:active,.pay-btn:active{transform:scale(.96);opacity:.85}
.event-card,.nearby-card,.notif-item{transition:transform .15s ease-out}
.event-card:active,.nearby-card:active,.notif-item:active{transform:scale(.985)}
.nav-item:active .nav-icon{transform:scale(.88)}
.nav-icon{transition:color .2s,transform .15s ease-out}

/* Staggered entrance for event cards (MD: 30-50ms per item) */
.event-card{animation:fade-in .3s ease-out both}
.event-card:nth-child(2){animation-delay:.04s}
.event-card:nth-child(3){animation-delay:.08s}
.event-card:nth-child(4){animation-delay:.12s}
.event-card:nth-child(5){animation-delay:.16s}
.event-card:nth-child(n+6){animation-delay:.2s}

/* Tabular figures: prices & timers update every second without width jitter */
[data-price-id],.countdown-time,#det-price{font-variant-numeric:tabular-nums}

/* Accessibility: respect reduced motion */
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}
}

/* ── TYPOGRAPHY ─────────────────────────── */
.t-white{color:rgba(255,255,255,.90)}.t-orange{color:var(--orange)}.t-green{color:var(--green)}
.t-silver{color:var(--silver)}.t-black{color:#000}.t-red{color:var(--red)}
.bold{font-weight:700}.xbold{font-weight:900}.semi{font-weight:600}
.ls{letter-spacing:1.5px}

/* ── LAYOUT HELPERS ─────────────────────── */
.row{display:flex;align-items:center}.col{display:flex;flex-direction:column}
.between{justify-content:space-between}.center-x{justify-content:center}
.center-y{align-items:center}.center{display:flex;align-items:center;justify-content:center}
.fill{flex:1}.w100{width:100%}.gap4{gap:4px}.gap8{gap:8px}.gap10{gap:10px}.gap12{gap:12px}
.gap14{gap:14px}.gap16{gap:16px}.gap20{gap:20px}
.px16{padding:0 16px}.px20{padding:0 20px}.px24{padding:0 24px}
.py4{padding-top:4px;padding-bottom:4px}.py8{padding-top:8px;padding-bottom:8px}
.py12{padding-top:12px;padding-bottom:12px}.py16{padding-top:16px;padding-bottom:16px}
.py18{padding-top:18px;padding-bottom:18px}.py24{padding-top:24px;padding-bottom:24px}
.p10{padding:10px}.p12{padding:12px}.p14{padding:14px}.p16{padding:16px}
.p18{padding:18px}.p20{padding:20px}
.mt4{margin-top:4px}.mt6{margin-top:6px}.mt8{margin-top:8px}.mt10{margin-top:10px}
.mt12{margin-top:12px}.mt14{margin-top:14px}.mt16{margin-top:16px}
.mt20{margin-top:20px}.mt24{margin-top:24px}.mt28{margin-top:28px}.mt30{margin-top:30px}
.mt32{margin-top:32px}.mt40{margin-top:40px}.pb12{padding-bottom:12px}

/* ── COMPONENTS ─────────────────────────── */
.card{background:var(--card);border-radius:16px;border:1px solid rgba(255,255,255,.05)}
.card-sm{background:var(--card);border-radius:12px;border:1px solid rgba(255,255,255,.05)}
.card-orange{background:var(--card);border-radius:16px;border:1.2px solid rgba(255,107,0,.4)}
.pill{border-radius:20px;padding:8px 16px;font-size:13px;font-weight:700;cursor:pointer;border:none;background:transparent}
.pill-active{background:var(--orange);color:#000}
.pill-inactive{border:1.2px solid var(--silver);color:#fff;opacity:.5}
.chip{border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;border:none}
.btn{border:none;cursor:pointer;font-weight:700;border-radius:12px;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-orange{background:var(--orange);color:#fff}
.btn-green{background:var(--green);color:#000}
.btn-ghost{background:transparent;color:var(--orange);border:none}
.icon-btn{width:42px;height:42px;border-radius:50%;background:rgba(0,0,0,.45);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#fff}
.badge-live{background:rgba(34,17,17,1);border:1px solid rgba(229,62,62,.4);border-radius:8px;padding:4px 8px;display:inline-flex;align-items:center;gap:6px}
.star{font-size:22px;cursor:pointer;line-height:1}
.divider{height:1px;background:var(--divider);width:100%;margin:10px 0}
.input-field{background:var(--card);border:1px solid var(--divider);border-radius:10px;padding:14px 16px 14px 46px;color:#fff;font-size:15px;width:100%;outline:none;-webkit-appearance:none}
.input-field:focus{border-color:var(--orange)}
.input-field.error{border-color:#e53e3e}
.input-wrap{position:relative}.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:18px;color:var(--orange)}
.err-msg{color:#e53e3e;font-size:12px;margin-top:3px}
.label{color:var(--silver);font-size:14px;margin-bottom:4px}
.tag{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--orange)}
.rounded-box{border-radius:16px;padding:16px}

/* ── BOTTOM NAV (floating pill, icon-only, overlays content) ── */
#bottom-nav{
  /* z-index above Leaflet panes/controls (which go up to 1000) */
  position:absolute;left:28px;right:28px;bottom:calc(12px + env(safe-area-inset-bottom));z-index:1200;
  background:rgba(26,26,26,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.07);border-radius:999px;
  box-shadow:0 10px 30px rgba(0,0,0,.45);
  padding:7px;display:flex;justify-content:space-between;align-items:center;
}
.nav-item{
  width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;position:relative;
  background:transparent;transition:background .25s ease,transform .15s ease-out;
}
.nav-icon svg{width:22px;height:22px}
.nav-item.active{background:var(--orange);box-shadow:0 4px 16px rgba(236,91,19,.45)}
.nav-icon{display:flex;transition:color .2s,transform .15s ease-out}
.nav-item.active .nav-icon{color:#fff}
.nav-item:not(.active) .nav-icon{color:var(--silver)}
.notif-badge{position:absolute;top:4px;right:4px;background:#e53e3e;color:#fff;border-radius:50%;width:16px;height:16px;font-size:9px;font-weight:700;display:flex;align-items:center;justify-content:center}

/* ── EVENT CARD ─────────────────────────── */
.event-card{border-radius:16px;border:1px solid #2D2D4F;overflow:hidden;cursor:pointer;margin-bottom:16px}
.event-card-body{padding:16px}

/* ── DETAIL ─────────────────────────────── */
.detail-backdrop{width:100%;height:260px;position:relative;overflow:hidden}
.detail-backdrop>img{width:100%;height:100%;object-fit:cover;opacity:.95}
.detail-backdrop-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.5) 0%,rgba(0,0,0,.05) 38%,rgba(15,15,15,.35) 78%,#0f0f0f 100%)}
.detail-backdrop-content{position:absolute;inset:0;padding:calc(18px + env(safe-area-inset-top)) 18px 18px;display:flex;flex-direction:column;justify-content:space-between}
.back-btn{width:48px;height:48px;border-radius:50%;background:rgba(0,0,0,.45);border:none;cursor:pointer;color:#fff;font-size:20px;display:flex;align-items:center;justify-content:center}

/* ── COUNTDOWN ───────────────────────────── */
.countdown-box{background:#242424;border-radius:16px;border:1px solid rgba(255,255,255,.05);padding:16px;text-align:center}
.countdown-time{font-family:'Courier New',monospace;font-size:40px;font-weight:900;color:#fff;letter-spacing:2px}

/* ── PRICE CHART ─────────────────────────── */
#price-chart{width:100%;height:160px;display:block}

/* ── WALLET QR ───────────────────────────── */
.qr-wrapper{width:160px;height:160px;background:#fff;border-radius:12px;padding:10px;margin:0 auto;position:relative;overflow:hidden}
.qr-laser{position:absolute;left:0;right:0;height:3px;background:var(--green);animation:laser-scan 2.2s linear infinite;z-index:2}

/* ── MAP (OpenStreetMap / Leaflet) ───────── */
#radar-map{width:100%;border-radius:24px;border:1.2px solid rgba(255,255,255,.1);background:#141414;position:relative;overflow:hidden}
.leaflet-container{background:#141414;font-family:inherit}
/* Dark-theme the standard OSM raster tiles (invert + desaturate) */
.leaflet-tile{filter:invert(1) hue-rotate(180deg) brightness(.85) saturate(.35) contrast(.92)}
.leaflet-control-attribution{background:rgba(0,0,0,.55)!important;color:rgba(255,255,255,.35)!important;font-size:8px!important}
.leaflet-control-attribution a{color:rgba(255,255,255,.5)!important}
.lf-pin-wrap{background:none;border:none}
.lf-pin{position:relative;cursor:pointer;transform:translate(-50%,-50%)}
/* invisible 44px hit area so pins meet minimum touch-target size */
.lf-pin::after{content:'';position:absolute;top:50%;left:50%;width:44px;height:44px;margin:-22px 0 0 -22px}
/* halo centered via margins (map-pulse animates transform, so it can't be used for centering) */
.lf-pin-halo{position:absolute;width:36px;height:36px;border-radius:50%;background:rgba(255,107,0,.35);border:1.5px solid rgba(255,107,0,.5);top:50%;left:50%;margin:-18px 0 0 -18px;animation:map-pulse 1.2s ease-out infinite;pointer-events:none}
.map-landmark{position:absolute;background:rgba(0,0,0,.4);border-radius:4px;padding:1.5px 4px;font-size:7px;font-weight:700;color:rgba(255,255,255,.35);letter-spacing:.5px;pointer-events:none}
.map-pin{position:absolute;transform:translate(-50%,-50%);cursor:pointer;z-index:5}
.map-pin-dot{width:16px;height:16px;border-radius:50%;background:#fff;border:3px solid;display:flex;align-items:center;justify-content:center}
.map-pin-dot-inner{width:5px;height:5px;border-radius:50%}
.map-pin-price{position:absolute;top:-20px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);border-radius:5px;padding:1.5px 5px;font-size:9px;font-weight:700;color:#fff;white-space:nowrap;border:1px solid;pointer-events:none}
.map-hud{position:absolute;right:12px;top:12px;display:flex;flex-direction:column;gap:8px;z-index:10}
.map-hud-btn{width:34px;height:34px;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.12);border-radius:8px;color:#fff;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center;border:none}
.map-live-badge{position:absolute;left:12px;top:12px;background:rgba(0,0,0,.75);border:1px solid rgba(255,255,255,.12);border-radius:10px;padding:5px 10px;display:flex;align-items:center;gap:6px;z-index:10}
.map-popup{position:absolute;bottom:12px;left:12px;right:12px;border-radius:14px;z-index:20;cursor:pointer;animation:fade-in .2s}

/* ── NEARBY PLANS ───────────────────────── */
.nearby-scroll{display:flex;gap:12px;overflow-x:auto;padding-bottom:4px}
.nearby-scroll::-webkit-scrollbar{display:none}
.nearby-card{min-width:260px;background:var(--card);border-radius:12px;border:1px solid rgba(255,255,255,.04);padding:10px;cursor:pointer;flex-shrink:0}

/* ── NOTIFICATION ITEM ──────────────────── */
.notif-item{border-radius:12px;border:1px solid;margin-bottom:12px;cursor:pointer;animation:fade-in .2s}

/* ── TICKET CARD (WALLET) ───────────────── */
.ticket-card{border-radius:16px;border:1.2px solid rgba(255,107,0,.4);background:var(--card);margin-bottom:20px;padding:18px}

/* ── SEAT DETAILS ───────────────────────── */
.seat-col{display:flex;flex-direction:column;gap:2px}
.seat-label{font-size:11px;color:var(--silver)}
.seat-val{font-size:15px;font-weight:700;color:#fff}

/* ── CHECKOUT SAVINGS ───────────────────── */
.savings-box{background:var(--green);border-radius:16px;padding:20px;text-align:center}

/* ── FAST PAY BTNS ──────────────────────── */
.pay-btn{flex:1;height:50px;border-radius:10px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;font-weight:700;font-size:15px}

/* ── EMPTY STATE ───────────────────────── */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:16px;margin:28px 20px;padding:44px 28px;background:var(--card);border:1px solid rgba(255,255,255,.06);border-radius:24px;box-shadow:0 12px 32px rgba(0,0,0,.35)}
input[type="search"]::-webkit-search-cancel-button,input[type="search"]::-webkit-search-decoration{-webkit-appearance:none;display:none}
.empty-icon-wrap{width:72px;height:72px;border-radius:50%;background:rgba(236,91,19,.08);border:1px solid rgba(236,91,19,.25);display:flex;align-items:center;justify-content:center;color:var(--orange)}

/* ── TICKET VISUAL ──────────────────────── */
.ticket-box{flex:1;height:100px;border-radius:12px;border:1.5px solid;padding:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}

/* ── SCARCITY ───────────────────────────── */
.scarcity{animation:pulse-dot .8s infinite;font-size:13px;font-weight:900;letter-spacing:1px;color:var(--orange);text-align:center;text-transform:uppercase}

/* ── DETAIL STICKY PRICE BAR ────────────── */
.detail-cta{
  flex-shrink:0;background:rgba(26,26,26,.92);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border-top:1px solid var(--divider);box-shadow:0 -8px 24px rgba(0,0,0,.35);
  padding:12px 20px calc(12px + env(safe-area-inset-bottom));
  display:flex;align-items:center;justify-content:space-between;gap:14px;
}
.detail-cta .row{flex-wrap:wrap}
.detail-cta-price{font-size:clamp(19px,7vw,26px);font-weight:900;color:var(--orange);font-variant-numeric:tabular-nums;line-height:1.1}
@media (max-width:360px){
  .detail-cta{padding:10px 14px calc(10px + env(safe-area-inset-bottom));gap:10px}
  .detail-cta .btn{height:48px!important;padding:0 14px!important;font-size:13px!important}
}
.detail-cta-orig{font-size:13px;color:var(--silver);text-decoration:line-through;font-variant-numeric:tabular-nums}
.detail-cta-save{font-size:11px;font-weight:700;color:var(--green);font-variant-numeric:tabular-nums}

/* ── SCREEN TRANSITIONS ─────────────────── */
.screen-wrap{position:absolute;inset:0;background:var(--bg);display:flex;flex-direction:column;z-index:50;animation:fade-in .2s}
</style>
</head>
<body>
<div id="app">
  <div id="root"></div>
</div>

<script>

   STATE
═══════════════════════════════════════════ */
const S = {

  activeTab: 'Eventos',   // Eventos | Favoritos | Alertas | Radar | Mis Entradas
  user: null,
  events: [],

function initEvents(){
  return [
    // ── FÚTBOL ──
    {id:'evt_el_clasico',teams:'FC Barcelona vs Real Madrid',stadium:'Spotify Camp Nou',date:'Hoy',time:'21:00h',category:'Futbol',originalPrice:180,basePrice:135,floorPrice:65,totalDur:1800,rem:1140,enViu:true,lat:41.3809,lng:2.1228,home:T.FCB,away:T.RMA},

/* ═══════════════════════════════════════════
   PRICE / LOGIC
═══════════════════════════════════════════ */
function currentPrice(ev){
  if(ev.startMs && !auctionActive(ev)) return ev.originalPrice; // drop not started yet
  const prog = 1 - Math.max(0,Math.min(1,ev.rem/ev.totalDur));
  const c = ev.basePrice - (ev.basePrice - ev.floorPrice)*prog;
  return Math.max(ev.floorPrice, Math.round(c*100)/100);
}
function savedAmount(ev){ return Math.max(0, Math.round((ev.originalPrice - currentPrice(ev))*100)/100); }

/* ── Auction activation: the price only starts dropping 3h before kick-off ── */
const DROP_LEAD_MS=3*3600*1000;
const MONTHS_ES={enero:0,febrero:1,marzo:2,abril:3,mayo:4,junio:5,julio:6,agosto:7,septiembre:8,octubre:9,noviembre:10,diciembre:11};
function parseStartMs(ev){
  const now=new Date();
  const [h,m]=String(ev.time||'20:00').replace('h','').split(':').map(Number);
  let d=new Date(now.getFullYear(),now.getMonth(),now.getDate(),h||20,m||0,0,0);
  if(ev.date==='Mañana'){ d.setDate(d.getDate()+1); }
  else if(ev.date==='Este fin de semana'){
    const add=((6-now.getDay())+7)%7; // days until next Saturday (0 if today is Saturday)
    d.setDate(d.getDate()+add);
  } else if(ev.date!=='Hoy'){
    const mm=ev.date.match(/^(\d{1,2})\s+de\s+([A-Za-zÀ-ÿ]+)/);
    if(mm && MONTHS_ES[mm[2].toLowerCase()]!==undefined){
      d=new Date(now.getFullYear(),MONTHS_ES[mm[2].toLowerCase()],+mm[1],h||20,m||0,0,0);
      if(d.getTime()<now.getTime()-12*3600e3) d.setFullYear(d.getFullYear()+1);
    }
  }
  return d.getTime();
}
function dropStartMs(ev){ return (ev.startMs||0)-DROP_LEAD_MS; }
function auctionActive(ev){ return !ev.startMs || Date.now()>=dropStartMs(ev); }
/* CatchTime badge: when the price drop opens (or is already live) */
function catchTimeHTML(ev,fs=10.5){
  const active=auctionActive(ev);
  return `<span style="font-size:${fs}px;font-weight:700;color:var(--orange);display:inline-flex;align-items:center;gap:4px;white-space:nowrap">
    ${ico('bolt',fs+2,2)}${active?'CatchTime activo':'CatchTime '+fmtClock(dropStartMs(ev))}</span>`;
}
function fmtClock(ms){
  const d=new Date(ms), now=new Date();
  const hh=String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0')+'h';
  if(d.toDateString()===now.toDateString()) return hh;
  const tom=new Date(now); tom.setDate(tom.getDate()+1);
  if(d.toDateString()===tom.toDateString()) return 'mañana '+hh;
  return `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')} ${hh}`;
}

function fmt(n){ return n.toFixed(2); }

function countdown(rem){
  const h = Math.floor(rem/3600);
  const m = Math.floor((rem%3600)/60);
  const s = rem%60;
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

/* ── TEAM CRESTS (SVG shields, drawn with each club's colors) ── */
function isMatch(ev){ return !!(ev.home&&ev.away); }
let crestUid=0;
function crestSVG(t,size=44){

    return `<img src="${t.img}" width="${size}" height="${size}" alt="${t.a}" loading="lazy"
      style="display:block;object-fit:contain;flex-shrink:0;filter:drop-shadow(0 2px 6px rgba(0,0,0,.45))">`;
  }
  const id='cg'+(crestUid++);
  return `<svg width="${size}" height="${size}" viewBox="0 0 48 48" style="display:block;filter:drop-shadow(0 2px 6px rgba(0,0,0,.45))" aria-hidden="true">
    <defs><linearGradient id="${id}" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="${t.c1}"/><stop offset="1" stop-color="${t.c2}"/>
    </linearGradient></defs>
    <path d="M24 3l17 5v15c0 10.5-7.2 17.6-17 22-9.8-4.4-17-11.5-17-22V8z" fill="url(#${id})" stroke="rgba(255,255,255,.9)" stroke-width="2.2" stroke-linejoin="round"/>
    <text x="24" y="29" text-anchor="middle" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="${t.a.length>3?10.5:12.5}" font-weight="900" fill="#fff" stroke="rgba(0,0,0,.4)" stroke-width="2.6" style="paint-order:stroke" letter-spacing=".5">${t.a}</text>
  </svg>`;
}
function vsVisual(ev,size=48){

    ${crestSVG(ev.home,size)}

}

/* Match card background: stadium photo underneath, team colors as a faint wash on top */
function matchCardBG(ev){

/* Short title for home cards: team abbreviations, keeping any "(ACB)"-style suffix */
function shortTeams(ev){

  const suf=(ev.teams.match(/\s*(\(.*\))$/)||[])[1]||'';
  return `${ev.home.a} vs ${ev.away.a}${suf?' '+suf:''}`;

function addNotif(eventId, title, message, type){
  S.notifications.unshift({
    id:'n'+(++S.notifId), eventId, title, message, type,
    isRead:false, ts:Date.now()
  });
  // If Alertas tab is open, re-render only tab content (no images = no flicker)
  if(S.screen==='radar' && S.activeTab==='Alertas'){
    const tc=document.getElementById('tab-content');
    if(tc) tc.innerHTML=renderTabContent();
  }
  // Badge is updated by the next tickUpdate() call (called every second)
}
function timeLabel(ts){
  const d=(Date.now()-ts)/1000;
  if(d<4)return'Ahora mismo';
  if(d<60)return`Hace ${Math.floor(d)} s`;
  if(d<3600)return`Hace ${Math.floor(d/60)} min`;
  return'Hace horas';
}

/* ═══════════════════════════════════════════
   TICKER (real-time price drop + notifications)
═══════════════════════════════════════════ */
let tickerInterval=null;
function startTicker(){
  if(tickerInterval)clearInterval(tickerInterval);
  tickerInterval=setInterval(()=>{
    let activated=false;
    S.events = S.events.map(ev=>{
      // Auction not open yet: price frozen at the original until 3h before kick-off
      if(!auctionActive(ev)){ return {...ev,_pre:true}; }
      if(ev._pre){ activated=true; } // just crossed the 3h threshold: refresh UI
      let rem = ev.rem - 1;
      let tickets = ev.tickets;
      if(rem<=0){ rem = ev.totalDur; tickets = initialTickets(ev.id); } // new auction round restocks
      // Realistic slow sell-off: other buyers snap seats more often as the price drops
      else {
        const urgency = 1 - rem/ev.totalDur;
        if(tickets>2 && Math.random() < 0.006 + 0.03*urgency*urgency) tickets--;
      }
      const updated = {...ev, rem, tickets, _pre:false};

      // Time urgency alerts
      if(rem===600||rem===300||rem===60){
        const isFav = S.favorites.has(ev.id);
        const mins = Math.floor(rem/60);
        addNotif(ev.id,`¡Tiempo límite de oferta!`,`Quedan solo ${mins} min para comprar entradas de ${ev.teams}${isFav?' (favorito)':''}.`,'time_urgency');
      }

      // Price drop alerts for favorites
      const cp = currentPrice(updated);
      const last = S.lastNotifiedPrices[ev.id];
      if(last===undefined){ S.lastNotifiedPrices[ev.id]=cp; }
      else if(last-cp>=5 && S.favorites.has(ev.id)){
        addNotif(ev.id,`¡Bajada de precio!`,`El precio de ${ev.teams} ha bajado a ${fmt(cp)}€, ¡un ahorro de ${fmt(updated.originalPrice-cp)}€!`,'price_drop');
        S.lastNotifiedPrices[ev.id]=cp;
      }

      return updated;
    });
    if(activated && (S.screen==='radar'||S.screen==='detail')) scheduleRender();
    tickUpdate();
  },1000);
}

/* ═══════════════════════════════════════════
   TICK UPDATE — surgical DOM patches, no re-render
═══════════════════════════════════════════ */
function tickUpdate(){
  // 1. Update event prices wherever they are visible
  S.events.forEach(ev=>{
    const p = fmt(currentPrice(ev))+'€';
    document.querySelectorAll(`[data-price-id="${ev.id}"]`).forEach(el=>{
      if(el.textContent!==p) el.textContent=p;
    });
  });

  // 2. Detail screen: countdown + big price + chart
  if(S.screen==='detail'){
    const ev=S.events.find(e=>e.id===S.selectedEventId);
    if(ev){
      const active=auctionActive(ev);
      const cd=document.getElementById('det-countdown');
      if(cd){
        const secs=active?ev.rem:Math.max(0,Math.ceil((dropStartMs(ev)-Date.now())/1000));
        const t=countdown(secs);
        if(cd.textContent!==t) cd.textContent=t;
      }
      const dp=document.getElementById('det-price');
      if(dp){ const p=fmt(currentPrice(ev))+'€'; if(dp.textContent!==p) dp.textContent=p; }
      const cs=document.getElementById('cta-save');
      if(cs){ const t=`Ahorras ${fmt(savedAmount(ev))}€`; if(cs.textContent!==t) cs.textContent=t; }
      const cc=document.getElementById('cta-countdown');
      if(cc){ const t=countdown(ev.rem); if(cc.textContent!==t) cc.textContent=t; }
      const sc=document.getElementById('det-scarcity');
      if(sc){
        const t=`Quedan ${ev.tickets} entradas`;
        if(sc.textContent!==t) sc.textContent=t;
        sc.style.color = ev.tickets<=5 ? 'var(--red)' : 'var(--silver)';
      }
      if(!chartRAF) drawPriceChart(ev); // reduced-motion fallback: one redraw per second
    }
  }

  // 3. Notification badge — update in place, create/remove as needed
  const unread=S.notifications.filter(n=>!n.isRead).length;
  const bellBtn=document.querySelector('[data-nav="Alertas"]');
  if(bellBtn){
    let badge=bellBtn.querySelector('.notif-badge');
    if(unread>0){
      if(!badge){
        badge=document.createElement('span');
        badge.className='notif-badge';
        bellBtn.appendChild(badge);
      }
      const txt=unread>9?'9+':String(unread);
      if(badge.textContent!==txt) badge.textContent=txt;
    } else if(badge){
      badge.remove();
    }
  }
}

/* ═══════════════════════════════════════════
   RENDER SCHEDULER (used only for user actions)

function doLogin(){
  const email=document.getElementById('inp-email').value.trim();
  const pwd=document.getElementById('inp-pwd').value;
  const emailEl=document.getElementById('email-err');
  const pwdEl=document.getElementById('pwd-err');
  let ok=true;
  if(!email||!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){
    emailEl.textContent='Introduce un correo electrónico válido';
    emailEl.style.display='block';
    document.getElementById('inp-email').classList.add('error');
    ok=false;
  }else{emailEl.style.display='none';}
  if(pwd.length<4){

    pwdEl.style.display='block';
    document.getElementById('inp-pwd').classList.add('error');
    ok=false;
  }else{pwdEl.style.display='none';}
  if(ok){ S.user=email; go('radar'); }
}

function renderHomeSections(){
  let list = getFiltered(S.selectedCategory);
  const q=(S.searchQuery||'').trim().toLowerCase();
  if(q) list=list.filter(e=>e.teams.toLowerCase().includes(q)||e.stadium.toLowerCase().includes(q));
  if(list.length===0){
    return `<div class="empty-state"><div class="empty-icon-wrap">${ico('slash',32,1.6)}</div><p class="t-silver" style="font-size:15px">No hay eventos que coincidan</p></div>`;
  }
  // Disjoint sections: populares = sports first (the app's essence: football, then
  // basketball/handball), best discounts as tie-break. Próximos = the rest.
  // Both ordered by event date: about to start first, then upcoming.
  const sportRank=e=>e.category==='Futbol'?0:(e.category==='Basquet'||e.category==='Handbol')?1:2;
  const byDiscount=[...list].sort((a,b)=>
    sportRank(a)-sportRank(b) || (savedAmount(b)/b.originalPrice)-(savedAmount(a)/a.originalPrice));
  const populares=byDiscount.slice(0, Math.min(5, Math.ceil(list.length/2))).sort((a,b)=>a.startMs-b.startMs);
  const popIds=new Set(populares.map(e=>e.id));
  const proximos=list.filter(e=>!popIds.has(e.id)).sort((a,b)=>a.startMs-b.startMs);

  let html='';
  if(proximos.length>0){
    html+=sectionHeader('Próximos eventos','proximos');
    html+= S.viewAll==='proximos'
      ?`<div style="display:flex;flex-direction:column;gap:12px;padding:2px 20px 10px">${proximos.map(ev=>renderMiniCard(ev,true)).join('')}</div>`
      :`<div class="hscroll" style="display:flex;gap:12px;overflow-x:auto;padding:2px 20px 10px;scrollbar-width:none">${proximos.map(ev=>renderMiniCard(ev)).join('')}</div>`;
  }
  if(populares.length>0){
    html+=sectionHeader('Más populares','populares');
    html+= S.viewAll==='populares'
      ?`<div style="display:flex;flex-direction:column;gap:12px;padding:2px 20px 10px">${populares.map(ev=>renderBigCard(ev,true)).join('')}</div>`
      :`<div class="hscroll" style="display:flex;gap:12px;overflow-x:auto;padding:2px 20px 10px;scrollbar-width:none">${populares.map(ev=>renderBigCard(ev)).join('')}</div>`;
  }

  // Cerca de ti: interactive mini-map with all event pins
  html+=`
  <div class="row between center-y" style="padding:14px 20px 10px">
    <span style="font-size:21px;font-weight:800;color:rgba(255,255,255,.92)">Cerca de ti</span>
    <button onclick="setTab('Radar')"
      style="background:none;border:none;cursor:pointer;color:var(--orange);font-size:12.5px;font-weight:700;padding:4px 0">
      Abrir radar
    </button>
  </div>
  <div style="padding:2px 20px 10px">
    <div style="position:relative;border-radius:24px;overflow:hidden;border:1px solid var(--divider)">
      <div id="home-map" style="height:240px"></div>
      <div id="home-map-overlay" style="position:absolute;left:10px;right:10px;bottom:10px;z-index:1100;display:none"></div>
    </div>
  </div>`;
  return html;
}

let homeMap=null;
function initHomeMap(){
  const el=document.getElementById('home-map');
  if(!el||typeof L==='undefined')return;
  if(homeMap){homeMap.remove();homeMap=null;}
  homeMap=L.map(el,{zoomControl:false});
  // Includes map-only POI events too — same universe as the radar
  const list = S.selectedCategory==='Todo'?S.events:S.events.filter(e=>e.category===CAT_MAP[S.selectedCategory]);
  // "Cerca de ti" = city-level view: fit only events near the user (<60 km),
  // so pins stay big enough to tap. Far events remain reachable by panning.
  const near=list.filter(e=>haversine(BCN_CENTER[0],BCN_CENTER[1],e.lat,e.lng)<60);
  const fitList=near.length?near:list;
  let fitLock=true;
  if(S.homeMapCenter) homeMap.setView(S.homeMapCenter, S.homeMapZoom||BCN_ZOOM);
  else if(fitList.length) homeMap.fitBounds(L.latLngBounds(fitList.map(e=>[e.lat,e.lng])).pad(0.15),{maxZoom:13,animate:false});
  else homeMap.setView(BCN_CENTER, BCN_ZOOM);
  osmTiles(homeMap);
  setTimeout(()=>{fitLock=false},400);
  homeMap.on('moveend zoomend',()=>{
    if(fitLock)return; // ignore the programmatic initial fit; only remember user pans/zooms
    const c=homeMap.getCenter();
    S.homeMapCenter=[c.lat,c.lng]; S.homeMapZoom=homeMap.getZoom();
  });
  list.forEach(ev=>{
    const m=L.marker([ev.lat,ev.lng],{
      icon:L.divIcon({className:'lf-pin-wrap',html:pinHTML(ev,false,false),iconSize:[0,0]})
    }).addTo(homeMap);
    m.on('click',()=>homeMapPick(ev.id));
  });
}

function hashCode(s){
  let h=0;for(let i=0;i<s.length;i++){h=(Math.imul(31,h)+s.charCodeAt(i))|0;}return h;
}

function drawQR(id, seed){
  const canvas=document.getElementById('qr-'+id);
  if(!canvas)return;
  const ctx=canvas.getContext('2d');
  const size=140, steps=8, step=size/steps;
  ctx.fillStyle='#fff';
  ctx.fillRect(0,0,size,size);

  function drawAnchor(cx,cy){
    ctx.fillStyle='#000';ctx.fillRect(cx,cy,step*2.5,step*2.5);
    ctx.fillStyle='#fff';ctx.fillRect(cx+step*.4,cy+step*.4,step*1.7,step*1.7);
    ctx.fillStyle='#000';ctx.fillRect(cx+step*.7,cy+step*.7,step*1.1,step*1.1);
  }
  drawAnchor(0,0);
  drawAnchor(size-step*2.5,0);
  drawAnchor(0,size-step*2.5);

  let rnd=Math.abs(seed);
  const next=()=>{rnd=((rnd*1664525+1013904223)&0xFFFFFFFF)>>>0;return rnd/0xFFFFFFFF;};
  ctx.fillStyle='#000';
  for(let r=0;r<steps;r++){
    for(let c=0;c<steps;c++){
      const anchor=(r<3&&c<3)||(r<3&&c>=steps-3)||(r>=steps-3&&c<3);
      if(!anchor&&next()>.5){
        ctx.fillRect(c*step,r*step,step*.9,step*.9);
      }
    }
  }
}

function getNearby(ev){
  return S.events.filter(e=>e.id!==ev.id)
    .map(e=>({e, d:haversine(ev.lat,ev.lng,e.lat,e.lng)}))
    .sort((a,b)=>a.d-b.d).slice(0,3);
}

function haversine(la1,lo1,la2,lo2){
  const R=6371;
  const dLat=(la2-la1)*Math.PI/180;
  const dLon=(lo2-lo1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(la1*Math.PI/180)*Math.cos(la2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

/* ── Share: native share sheet, clipboard fallback ── */
function shareEvent(id){
  const ev=S.events.find(e=>e.id===id);
  if(!ev)return;
  const text=`${ev.teams} · ${ev.date} ${ev.time} en ${ev.stadium}. ¡Ahora a ${fmt(currentPrice(ev))}€ en TicketCatch!`;
  if(navigator.share){
    navigator.share({title:'TicketCatch — '+ev.teams,text,url:location.href}).catch(()=>{});
  } else if(navigator.clipboard){
    navigator.clipboard.writeText(text+' '+location.href);
    addNotif(id,'Enlace copiado','Los datos del evento se han copiado al portapapeles para compartir.','favorite');
  }
}

      </div>
    </div>
    <div style="height:100px"></div>
  </div>

  <!-- CTA -->
  <div style="padding:24px 20px;background:var(--bg);flex-shrink:0;padding-bottom:calc(24px + env(safe-area-inset-bottom))">
    <button class="btn btn-green w100" style="height:64px;font-size:16px;font-weight:700;border-radius:16px"
      onclick="go('checkout')">
      CONTINUAR CON ${qty} ${qty===1?'ENTRADA':'ENTRADAS'}
    </button>
  </div>
</div>`;
}

function setQty(q){
  S.checkoutQty=Math.max(1,Math.min(2,q));
  render();
}

/* ═══════════════════════════════════════════
   CHECKOUT SCREEN
═══════════════════════════════════════════ */
function renderCheckout(){
  const ev = S.checkoutEvent;
  if(!ev) return `<div class="screen center" style="background:var(--bg)"><span class="t-white">Cargando...</span></div>`;
  const qty=S.checkoutQty;
  const locked=S.checkoutLockedPrice;
  const totalOrig=ev.originalPrice*qty;
  const totalLocked=locked*qty;
  const fee=totalLocked*.05;
  const base=totalLocked-fee;
  const saved=Math.max(0,totalOrig-totalLocked);

  return `
<div class="screen fade-in" style="background:var(--bg)">
  <div class="fill scroll safe-top px24">
    <!-- Header -->
    <div class="row gap12 center-y py18">
      <button class="back-btn" onclick="go('selection')" style="display:flex;align-items:center;justify-content:center">${ico('arrowLeft',20,2)}</button>
      <span style="font-size:20px;font-weight:700;color:#fff">Resumen del Pedido</span>
    </div>

    <!-- Event summary -->
    <div class="card-sm p16">
      <div style="font-size:16px;font-weight:800;color:#fff">${ev.teams}</div>
      <div class="t-silver" style="font-size:13px;margin-top:4px">${ev.stadium} • ${ev.date} ${ev.time}</div>
      <div class="t-orange bold" style="font-size:13px;margin-top:6px">Cantidad: ${qty} ${qty===1?'entrada':'entradas'}</div>
    </div>

    <!-- Savings highlight -->
    <div class="savings-box mt24">
      <div style="font-size:14px;color:#000">Te has ahorrado</div>
      <div style="font-size:36px;font-weight:900;color:#000">${fmt(saved)} €</div>
      <div style="font-size:14px;color:#000">respecto a taquilla</div>
    </div>

    <!-- Breakdown -->
    <div class="card-sm p16 mt28">
      <div class="row between">
        <span class="t-silver" style="font-size:14px">Entradas (${qty} x ${fmt(locked)}€):</span>
        <span class="t-white" style="font-size:14px">${fmt(base)}€</span>
      </div>
      <div class="row between mt12">
        <span class="t-silver" style="font-size:14px">Gastos de Gestión (5%):</span>
        <span class="t-orange bold" style="font-size:14px">${fmt(fee)}€</span>
      </div>
      <div class="divider"></div>
      <div class="row between center-y">
        <span class="t-white bold" style="font-size:16px">TOTAL:</span>
        <span class="row gap8 center-y">
          <span class="t-silver" style="font-size:14px;text-decoration:line-through">${fmt(totalOrig)}€</span>
          <span style="font-size:24px;font-weight:900;color:#fff">${fmt(totalLocked)}€</span>
        </span>
      </div>
    </div>

    <!-- Fast pay -->
    <div class="row gap12 mt30">
      <button class="pay-btn" style="background:#fff;color:#000" onclick="confirmPay()">
         Pay
      </button>
      <button class="pay-btn" style="background:#000;color:#fff;border:1.2px solid #fff" onclick="confirmPay()">
        G Pay
      </button>
    </div>
    <div style="height:100px"></div>
  </div>

  <!-- Confirm CTA -->
  <div style="padding:24px 20px;background:var(--bg);flex-shrink:0;padding-bottom:calc(24px + env(safe-area-inset-bottom))">
    <button class="btn btn-green w100" style="height:64px;font-size:17px;font-weight:700;border-radius:16px"
      onclick="confirmPay()">
      CONFIRMAR PAGO
    </button>
  </div>
</div>`;
}

function confirmPay(){
  const ev=S.checkoutEvent;
  if(!ev)return;
  const qty=S.checkoutQty;
  const price=S.checkoutLockedPrice;
  for(let i=0;i<qty;i++){
    S.boughtTickets.push({
      id:'tkt_'+Math.random().toString(36).slice(2,10),
      eventId:ev.id,
      teams:ev.teams+(qty>1?` (Asiento ${i+1})`:''),
      stadium:ev.stadium,
      date:ev.date,
      time:ev.time,
      pricePaid:price,
      originalPrice:ev.originalPrice,
      savedAmount:Math.max(0,ev.originalPrice-price),
      gate:String(Math.floor(Math.random()*6)+1),
      row:String(Math.floor(Math.random()*28)+1),
      seat:String(Math.floor(Math.random()*45)+1),
      qrToken:'TICKETCATCH_'+Math.random().toString(36).toUpperCase().slice(2),
    });
  }
  S.events=S.events.map(e=>e.id===ev.id?{...e,tickets:Math.max(1,(e.tickets||2)-qty)}:e);
  S.activeTab='Mis Entradas';
  go('radar');
}

/* ═══════════════════════════════════════════
   ACTIONS
═══════════════════════════════════════════ */
function toggleFav(id){
  if(S.favorites.has(id)){
    S.favorites.delete(id);
  } else {
    S.favorites.add(id);
    const ev=S.events.find(e=>e.id===id);
    if(ev){
      addNotif(id,'Guardado en Favoritos',`Has guardado ${ev.teams} en favoritos. Te avisaremos cuando baje de precio.`,'favorite');
    }
  }
  render();
}

function goDetail(id){
  const tc=document.getElementById('tab-content');
  if(tc) S._tabScroll=tc.scrollTop;
  S.selectedEventId=id;
  S.selectedNearbyId=null;
  S.descOpen=false;
  go('detail');
}

function toggleDesc(){
  S.descOpen=!S.descOpen;
  render();
}

function goSelection(evId){
  const ev=S.events.find(e=>e.id===evId);
  if(!ev)return;
  S.checkoutEvent=ev;
  S.checkoutLockedPrice=currentPrice(ev);
  S.checkoutQty=1;
  go('selection');
}

function clearTickets(){
  S.boughtTickets=[];
  render();
}

/* ═══════════════════════════════════════════
   CANVAS DRAWING
═══════════════════════════════════════════ */
function drawPriceChart(ev, t){
  const canvas=document.getElementById('price-chart');
  if(!canvas)return;
  t = t||performance.now();
  // Crisp rendering: size the bitmap to CSS px * devicePixelRatio
  const dpr=window.devicePixelRatio||1;
  const cw=canvas.clientWidth||canvas.parentElement.clientWidth||300;
  const ch=canvas.clientHeight||150;
  const bw=Math.round(cw*dpr), bh=Math.round(ch*dpr);
  if(canvas.width!==bw||canvas.height!==bh){canvas.width=bw;canvas.height=bh;}
  const ctx=canvas.getContext('2d');
  ctx.setTransform(dpr,0,0,dpr,0,0);
  const w=cw, h=ch;
  ctx.clearRect(0,0,w,h);

  // Plot area: left margin for price labels, bottom for time labels
  const padL=40, padR=12, padT=12, padB=24;
  const plotW=w-padL-padR, plotB=h-padB;
  // Y scale with headroom so the line never kisses the edges
  const span=ev.basePrice-ev.floorPrice;
  const yMax=ev.basePrice+span*.08, yMin=ev.floorPrice-span*.08;
  const yOf=p=>padT+(1-(p-yMin)/(yMax-yMin))*(plotB-padT);
  const cp=currentPrice(ev);
  // Sub-second x progress so the dot creeps forward smoothly between ticks
  const elapsed=Math.min(ev.totalDur,(ev.totalDur-ev.rem)+((t/1000)%1));
  const frac=elapsed/ev.totalDur;
  const curX=padL+plotW*frac;
  const curY=yOf(cp);
  const yBase=yOf(ev.basePrice);

  // ── Y axis: 3 price ticks (base / mid / floor) with gridlines
  ctx.font='700 11px -apple-system,sans-serif';
  ctx.textAlign='right';ctx.textBaseline='middle';
  [ev.basePrice,(ev.basePrice+ev.floorPrice)/2,ev.floorPrice].forEach(p=>{
    const y=yOf(p);
    ctx.strokeStyle='rgba(160,174,192,.10)';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(padL,y);ctx.lineTo(w-padR,y);ctx.stroke();
    ctx.fillStyle='rgba(160,174,192,.75)';
    ctx.fillText(Math.round(p)+'€',padL-7,y);
  });

  // ── X axis: real clock times across the auction window + AHORA at the dot
  const startMs=Date.now()-elapsed*1000;
  const fmtT=ms=>{const d=new Date(ms);return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0');};
  ctx.textAlign='center';ctx.textBaseline='alphabetic';
  ctx.font='600 10px -apple-system,sans-serif';
  [0,1/3,2/3].forEach(f=>{
    const x=padL+plotW*f;
    if(Math.abs(x-curX)<42)return; // don't collide with AHORA
    ctx.fillStyle='rgba(160,174,192,.65)';
    ctx.fillText(fmtT(startMs+f*ev.totalDur*1000),x,h-8);
  });
  // AHORA: green, bold, underlined — anchored to the live dot
  ctx.font='900 10px -apple-system,sans-serif';
  const nowX=Math.min(Math.max(curX,padL+22),w-padR-24);
  ctx.fillStyle='#34D399';
  ctx.fillText('AHORA',nowX,h-8);
  const nw=ctx.measureText('AHORA').width;
  ctx.strokeStyle='#34D399';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(nowX-nw/2,h-5);ctx.lineTo(nowX+nw/2,h-5);ctx.stroke();

  // ── Dashed reference line at the current price (full width, like a tracker)
  ctx.strokeStyle='rgba(255,255,255,.45)';ctx.lineWidth=1.3;
  ctx.setLineDash([5,6]);
  ctx.beginPath();ctx.moveTo(padL,curY);ctx.lineTo(w-padR,curY);ctx.stroke();
  ctx.setLineDash([]);

  // ── History curve: accurate endpoints with a gentle organic wobble
  const seed=Math.abs(hashCode(ev.id));
  const amp=(plotB-padT)*.045;
  const pts=[];
  const steps=48;
  for(let i=0;i<=steps;i++){
    const f=i/steps;
    const x=padL+(curX-padL)*f;
    const yLin=yBase+(curY-yBase)*f;
    // wobble fades to zero at both endpoints so start/current prices stay exact
    const wob=(Math.sin(f*6.5+seed%9)*.6+Math.sin(f*12.7+seed%5)*.4)*amp*Math.sin(f*Math.PI);
    pts.push([x,Math.min(plotB-2,Math.max(padT+2,yLin+wob))]);
  }

  // Gradient fill under the curve (green fading down, like the reference)
  const grad=ctx.createLinearGradient(0,padT,0,plotB);
  grad.addColorStop(0,'rgba(52,211,153,.22)');grad.addColorStop(1,'rgba(52,211,153,.02)');
  ctx.fillStyle=grad;
  ctx.beginPath();ctx.moveTo(pts[0][0],plotB);
  pts.forEach(p=>ctx.lineTo(p[0],p[1]));
  ctx.lineTo(curX,plotB);ctx.closePath();ctx.fill();

  // The line itself
  ctx.strokeStyle='#34D399';ctx.lineWidth=3.5;ctx.lineCap='round';ctx.lineJoin='round';
  ctx.shadowColor='rgba(52,211,153,.45)';ctx.shadowBlur=7;
  ctx.beginPath();ctx.moveTo(pts[0][0],pts[0][1]);
  pts.forEach(p=>ctx.lineTo(p[0],p[1]));
  ctx.stroke();
  ctx.shadowBlur=0;

  // ── Live dot: calm pulse
  const pulse=(Math.sin(t/450)+1)/2;
  ctx.fillStyle=`rgba(52,211,153,${.10+.08*pulse})`;
  ctx.beginPath();ctx.arc(curX,curY,13+3*pulse,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#34D399';
  ctx.beginPath();ctx.arc(curX,curY,5.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#141414';
  ctx.beginPath();ctx.arc(curX,curY,2,0,Math.PI*2);ctx.fill();

  // ── Current price tag riding the dashed line (flips side near the right edge)
  const tag=fmt(cp)+'€';
  ctx.font='900 12px -apple-system,sans-serif';
  ctx.textAlign='left';
  const tw=ctx.measureText(tag).width;
  const tagX=curX+tw+20>w-padR ? curX-tw-16 : curX+12;
  const tagY=Math.max(padT+12,curY-9);
  ctx.fillStyle='rgba(0,0,0,.7)';
  ctx.beginPath();
  if(ctx.roundRect)ctx.roundRect(tagX-5,tagY-11,tw+10,16,5);else ctx.rect(tagX-5,tagY-11,tw+10,16);
  ctx.fill();
  ctx.fillStyle='#34D399';
  ctx.fillText(tag,tagX,tagY+1);
  ctx.textAlign='start';
}

/* Live chart loop: redraws every frame while the detail screen is open */
let chartRAF=null;
function startChartAnim(){
  if(chartRAF){cancelAnimationFrame(chartRAF);chartRAF=null;}
  if(window.matchMedia&&window.matchMedia('(prefers-reduced-motion: reduce)').matches){
    const ev=S.events.find(e=>e.id===S.selectedEventId);
    if(ev)drawPriceChart(ev);
    return; // reduced motion: tickUpdate redraws once per second instead
  }
  const loop=(t)=>{
    if(S.screen!=='detail'){chartRAF=null;return;}
    const ev=S.events.find(e=>e.id===S.selectedEventId);
    if(ev)drawPriceChart(ev,t);
    chartRAF=requestAnimationFrame(loop);
  };
  chartRAF=requestAnimationFrame(loop);
}

/* ═══════════════════════════════════════════
   MAIN RENDER
═══════════════════════════════════════════ */
function render(){
  const root=document.getElementById('root');
  if(!root)return;

  // Preserve detail scroll across re-renders (only if we stay on the same event)
  const ds0=document.getElementById('detail-scroll');
  const dsPos=ds0?{ev:ds0.dataset.ev,top:ds0.scrollTop}:null;

  let html='';
  switch(S.screen){
    case 'login':    html=renderLogin(); break;
    case 'radar':    html=renderRadar(); break;
    case 'detail':   html=renderDetail(); break;
    case 'selection':html=renderSelection(); break;
    case 'checkout': html=renderCheckout(); break;
    default: html=renderLogin();
  }
  root.innerHTML=html;

  if(S.screen==='detail'&&dsPos){
    const ds1=document.getElementById('detail-scroll');
    if(ds1&&ds1.dataset.ev===dsPos.ev) ds1.scrollTop=dsPos.top;
  }

  // Restore list scroll position when returning from detail (state preservation)
  if(S.screen==='radar' && S._tabScroll){
    const tc=document.getElementById('tab-content');
    if(tc) tc.scrollTop=S._tabScroll;
    S._tabScroll=0;
  }

  // Post-render canvas/DOM effects
  setTimeout(()=>{
    if(S.screen==='detail'){
      startChartAnim();
      initDetailMap();
    }
    if(S.screen==='radar'&&S.activeTab==='Radar'){
      initRadarMap();
    }
    if(S.screen==='radar'&&S.activeTab==='Eventos'){
      initHomeMap();
    }
    if(S.screen==='radar'&&S.activeTab==='Mis Entradas'){
      S.boughtTickets.forEach(t=>drawQR(t.id,hashCode(t.id)));
    }
  },30);
}

/* ═══════════════════════════════════════════
   INIT
═══════════════════════════════════════════ */
function initialTickets(id){ return 9+(Math.abs(hashCode(id))%28); } // 9..36 seats, stable per event

function init(){
  // 3x longer auction window = price drops 3x slower per second
  S.events=initEvents().map(ev=>{
    const e={...ev,totalDur:ev.totalDur*3,rem:ev.rem*3,tickets:initialTickets(ev.id)};
    e.startMs=parseStartMs(e);
    // Flagship demo event: El Clásico always kicks off ~2h from now, so its
    // CatchTime is live the moment you open the app
    if(e.id==='evt_el_clasico'){
      const st=new Date(Date.now()+2*3600e3);
      st.setMinutes(st.getMinutes()<30?30:60,0,0);
      e.startMs=st.getTime();
      e.time=String(st.getHours()).padStart(2,'0')+':'+String(st.getMinutes()).padStart(2,'0')+'h';
    }
    if(!auctionActive(e)) e.rem=e.totalDur; // drop hasn't started: full window pending
    return e;
  });
  render();
  startTicker();
}

init();

// Expose all onclick-callable functions to global scope
const _g = {doLogin,quickRegister,setTab,setCat,toggleFav,goDetail,goSelection,
  go,setQty,confirmPay,clearNotifs,markNotifRead,openNotif,clearTickets,shareEvent,toggleDesc,
  setRadarCat,selectMapEvent,zoomMap,resetMap,selectNearby,toggleSearch,setSearchQ,toggleViewAll};
Object.assign(window, _g);

})();
